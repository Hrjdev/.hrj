<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Google 1998 Beta</title>
    <!-- Harici CSS dosyamızı (tasarımları) buraya bağlıyoruz -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Sayfadaki tüm içeriği ortalamak için oluşturduğumuz ana kapsayıcı -->
    <div class="container">

        <!-- Google Logosu -->
        <img src="https://www.google.com/logos/1998/googlebeta.jpg" alt="Google 1998 Logo" class="logo">

        <!-- Arama Bölümü -->
        <div class="search-section">
            <p class="search-text">Search the web using Google!</p>
            <input type="text" class="search-box">
            <div class="buttons">
                <button>Google Search</button>
                <button>I'm feeling lucky</button>
            </div>
        </div>

        <!-- Alt kısımdaki 3 kolonlu renkli alan. -->
        <div class="footer-box">
            
            <!-- 1. Kolon: Özel Aramalar -->
            <div class="column">
                <p>Special Searches</p>
                <a href="#">Stanford Search</a><br>
                <a href="#">Linux Search</a>
            </div>

            <!-- 2. Kolon: Yardım ve Hakkında Linkleri -->
            <div class="column">
                <a href="#">Help!</a><br>
                <a href="#">About Google!</a><br>
                <a href="#">Company Info</a><br>
                <a href="#">Google! Logos</a>
            </div>

            <!-- 3. Kolon: Mail Aboneliği -->
            <div class="column">
                <p>Get Google!<br>updates monthly:</p>
                <!-- İçinde varsayılan yazı olan mail inputu -->
                <input type="text" placeholder="Your e-mail" class="email-box"><br>
                <button>Subscribe</button> 
                <a href="#">Archive</a>
            </div>

        </div>

        <!-- En alt kısım: Telif Hakkı Yazısı -->
        <p class="copyright">Copyright &copy;1998 Google Inc.</p>

    </div>

</body>
</html>
