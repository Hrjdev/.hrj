<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Google</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Üst menü alanı (Yönerge: Üstteki alanı sağ tarafa alın) -->
    <header class="top-nav">
        <a href="#">Gmail</a>
        <a href="#">Images</a>
        
        <!-- Uygulamalar ikonunu temsil eden menü -->
        <div class="apps-icon">
            <!-- Temsili bir menü ikonu eklendi -->
            <img src="https://ssl.gstatic.com/gb/images/bar/al-icon.png" width="16" alt="Apps">
        </div>
        
        <!-- Profil fotoğrafı (Yönerge: kendi fotoğrafınız ile değiştirin) -->
        <!-- Temsili avatar kullanıldı, kendi fotoğrafının yolunu 'src' içine yazabilirsin -->
        <img class="profile-pic" src="https://lh3.googleusercontent.com/ogw/AF2bZyiK6Qar3DT0IMribZpAl3ETkn3zJKBhBQaUkAjq5Cq7S_c=s32-c-mo" alt="Profile">
    </header>

    <!-- Ana İçerik -->
    <main class="main-content">
        
        <!-- Modern Google Logosu (Yönerge: günümüzde logo ile değiştirmelisiniz) -->
        <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" alt="Google Logo">

        <!-- Arama Alanı Çerçevesi (Yönerge: kenarlarını yarıçap özelliği ile düzenleyiniz) -->
        <div class="search-container">
            <!-- Arama ikonu -->
            <img class="search-icon" src="https://www.flaticon.com/free-icon/plus_748113?term=google+plus&page=1&position=1&origin=search&related_id=748113" alt="Search">
            
            <!-- Yazı yazılan yer (Yönerge: genişliği 480px olmalı ve kenarlığı olmamalı) -->
            <input type="text" class="search-input">
            
            <!-- Sesli arama ikonu (Yönerge: sesle arama simgesini de siz ekleyin) -->
            <img class="mic-icon" src="https://upload.wikimedia.org/wikipedia/commons/e/e8/Google_mic.svg" alt="Voice Search">
        </div>

        <!-- Butonlar (Yönerge: Buttonları ortaya alıp üstünden ve sağından boşluklar veriniz) -->
        <div class="buttons-container">
            <button class="google-btn">Google Search</button>
            <button class="google-btn">I'm Feeling Lucky</button>
        </div>

    </main>

    <!-- Alt Kısım / Footer -->
    <footer class="footer">
        <!-- Sol alt linkler (Yönerge: liste noktalarını ortadan kaldırın) -->
        <ul class="footer-links left-links">
            <li><a href="#">Advertising</a></li>
            <li><a href="#">Business</a></li>
            <li><a href="#">How Search works</a></li>
        </ul>
        
        <!-- Sağ alt linkler -->
        <ul class="footer-links right-links">
            <li><a href="#">Privacy</a></li>
            <li><a href="#">Terms</a></li>
            <li><a href="#">Settings</a></li>
        </ul>
    </footer>

</body>
</html>
